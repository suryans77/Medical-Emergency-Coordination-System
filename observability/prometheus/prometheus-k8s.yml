global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: mediflow-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:80
          - user-service:80
          - emergency-request-service:80
          - ambulance-service:80
          - location-service:80
          - matching-service:80
          - hospital-service:80
          - case-service:80
          - notification-service:80

  - job_name: kube-state-metrics
    static_configs:
      - targets:
          - kube-state-metrics:8080

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
