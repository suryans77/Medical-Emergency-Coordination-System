server:
  port: ${SERVER_PORT:8088} # Note: Your service will run on 8088 locally!

spring:
  application:
    name: notification-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      group-id: ${spring.application.name}
      # --- INTEGRATED FROM MVP: Tells Kafka to convert bytes to Objects ---
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      # --------------------------------------------------------------------
      properties:
        spring.json.trusted.packages: org.example.*
    producer:
      acks: all
      retries: 10
      properties:
        enable.idempotence: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

medical:
  events:
    topics:
      notification-events: notification-events
      case-events: case-events
  idempotency:
    enabled: true
    processed-event-retention: 30d
  notifications:
    websocket-endpoint: /ws/notifications
  security:
    jwt:
      issuer: ${JWT_ISSUER:medical-emergency-coordination-system}
      jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}