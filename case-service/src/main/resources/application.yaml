server:
  port: ${SERVER_PORT:8087}

spring:
  application:
    name: case-service
  datasource:
    url: jdbc:postgresql://${CASE_DB_HOST:localhost}:${CASE_DB_PORT:5437}/${CASE_DB_NAME:case_service}
    username: ${CASE_DB_USERNAME:medical}
    password: ${CASE_DB_PASSWORD:medical}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      group-id: ${spring.application.name}
      properties:
        spring.json.trusted.packages: org.example.*
    producer:
      acks: all
      retries: 10
      properties:
        enable.idempotence: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

medical:
  events:
    topics:
      emergency-events: emergency-events
      ambulance-events: ambulance-events
      hospital-events: hospital-events
      case-events: case-events
  idempotency:
    enabled: true
    processed-event-retention: 30d
  outbox:
    enabled: true
    relay-interval: 5s
  saga:
    enabled: true
    compensation-timeout: 30s
    reassignment-topic: ambulance-events
    reroute-topic: hospital-events
  security:
    jwt:
      issuer: ${JWT_ISSUER:medical-emergency-coordination-system}
      jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}
