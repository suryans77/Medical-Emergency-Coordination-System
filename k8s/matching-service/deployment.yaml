apiVersion: apps/v1
kind: Deployment
metadata:
  name: matching-service
  namespace: mediflow
  labels:
    app: matching-service
    app.kubernetes.io/part-of: mediflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: matching-service
  template:
    metadata:
      labels:
        app: matching-service
    spec:
      containers:
        - name: matching-service
          image: mediflow/matching-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: db-secrets
            - secretRef:
                name: jwt-secret
          env:
            - name: SERVER_PORT
              value: "8085"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 5
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
