apiVersion: v1
kind: Service
metadata:
  name: location-service
  namespace: mediflow
  labels:
    app: location-service
    app.kubernetes.io/part-of: mediflow
spec:
  type: ClusterIP
  selector:
    app: location-service
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8084
