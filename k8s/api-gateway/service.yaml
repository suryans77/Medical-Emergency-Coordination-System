apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: mediflow
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: mediflow
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080
