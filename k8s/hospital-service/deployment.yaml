apiVersion: apps/v1
kind: Deployment
metadata:
  name: hospital-service
  namespace: mediflow
  labels:
    app: hospital-service
    app.kubernetes.io/part-of: mediflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hospital-service
  template:
    metadata:
      labels:
        app: hospital-service
    spec:
      containers:
        - name: hospital-service
          image: mediflow/hospital-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: common-config
            - secretRef:
                name: db-secrets
            - secretRef:
                name: jwt-secret
          env:
            - name: SERVER_PORT
              value: "8086"
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
