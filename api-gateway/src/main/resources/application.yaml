server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/users/**,/api/auth/**
            - id: emergency-request-service
              uri: ${EMERGENCY_REQUEST_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/emergencies/**
            - id: ambulance-service
              uri: ${AMBULANCE_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/ambulances/**
            - id: location-service
              uri: ${LOCATION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/locations/**
            - id: matching-service
              uri: ${MATCHING_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/matching/**
            - id: hospital-service
              uri: ${HOSPITAL_SERVICE_URL:http://localhost:8086}
              predicates:
                - Path=/api/hospitals/**
            - id: case-service
              uri: ${CASE_SERVICE_URL:http://localhost:8087}
              predicates:
                - Path=/api/cases/**
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8088}
              predicates:
                - Path=/api/notifications/**,/ws/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

medical:
  security:
    jwt:
      issuer: ${JWT_ISSUER:medical-emergency-coordination-system}
      jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}
