server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: location-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  datasource:
    url: jdbc:postgresql://${LOCATION_DB_HOST:localhost}:${LOCATION_DB_PORT:5438}/${LOCATION_DB_NAME:location_service}
    username: ${LOCATION_DB_USERNAME:medical}
    password: ${LOCATION_DB_PASSWORD:medical}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      group-id: ${spring.application.name}
      properties:
        spring.json.trusted.packages: org.example.*
    producer:
      acks: all
      retries: 10
      properties:
        enable.idempotence: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

medical:
  events:
    topics:
      location-events: location-events
      ambulance-events: ambulance-events
  grpc:
    server-port: ${LOCATION_GRPC_PORT:9094}
  idempotency:
    enabled: true
    processed-event-retention: 30d
  outbox:
    enabled: true
    relay-interval: 5s
  security:
    jwt:
      issuer: ${JWT_ISSUER:medical-emergency-coordination-system}
      jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}
