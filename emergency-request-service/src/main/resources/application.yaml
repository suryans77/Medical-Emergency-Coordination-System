server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: emergency-request-service
  datasource:
    url: jdbc:postgresql://${EMERGENCY_DB_HOST:localhost}:${EMERGENCY_DB_PORT:5434}/${EMERGENCY_DB_NAME:emergency_request_db}
    username: ${EMERGENCY_DB_USERNAME:medical}
    password: ${EMERGENCY_DB_PASSWORD:medical}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      group-id: ${spring.application.name}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.example.*
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      retries: 10
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    metrics:
      tags:
        application: ${spring.application.name}
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}

medical:
  events:
    topics:
      emergency-events: emergency-events
      matching-events: matching-events
  idempotency:
    enabled: true
    processed-event-retention: 30d
  outbox:
    enabled: true
    relay-interval: 5s
  security:
    jwt:
      issuer: ${JWT_ISSUER:medical-emergency-coordination-system}
      jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}
